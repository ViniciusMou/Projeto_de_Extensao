<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo à LifeStyle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos específicos para esta página de boas-vindas */
        body {
            overflow: hidden; /* Evita barras de rolagem */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a; /* Fundo escuro para contraste */
            color: #fff;
            font-family: 'Roboto', sans-serif; /* Usando a fonte Roboto */
            cursor: none; /* Esconde o cursor padrão */
        }

        /* Container para as partículas de fundo */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1; /* Abaixo do conteúdo principal */
        }

        .welcome-container {
            text-align: center;
            position: relative; /* Para que os elementos filhos possam ser posicionados */
            z-index: 10;
            /* Adicione uma perspectiva para o efeito parallax */
            transform-style: preserve-3d;
            perspective: 1000px; /* Define o ponto de fuga da perspectiva */
        }

        .welcome-container h1 {
            font-size: 4em;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            /* Propriedade para o parallax */
            transform: translateZ(0); /* Inicia na camada Z=0 */
            transition: transform 0.1s ease-out; /* Transição suave para o movimento */
        }

        .enter-button {
            background-color: var(--primary-color); /* Usando a cor primária */
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-decoration: none;
            display: inline-block;
            /* Propriedade para o parallax */
            transform: translateZ(0); /* Inicia na camada Z=0 */
            transition: transform 0.1s ease-out; /* Transição suave para o movimento */
        }

        .enter-button:hover {
            background-color: #45a049; /* Tom mais escuro do verde */
            transform: scale(1.05);
        }

        /* Efeito de brilho que segue o cursor */
        .cursor-glow {
            position: fixed;
            width: 80px; /* Tamanho do brilho */
            height: 80px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none; /* Permite clicar nos elementos abaixo */
            transform: translate(-50%, -50%); /* Centraliza o brilho no cursor */
            transition: width 0.1s ease, height 0.1s ease; /* Transição para o efeito de click */
            z-index: 5;
        }

        .cursor-glow.clicked {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, transparent 70%);
        }

        /* Responsividade para a tela de boas-vindas */
        @media (max-width: 768px) {
            .welcome-container h1 {
                font-size: 3em;
            }
            .enter-button {
                font-size: 1.1em;
                padding: 12px 25px;
            }
            .cursor-glow {
                width: 60px;
                height: 60px;
            }
            .cursor-glow.clicked {
                width: 90px;
                height: 90px;
            }
        }

        @media (max-width: 480px) {
            .welcome-container h1 {
                font-size: 2.2em;
            }
            .enter-button {
                font-size: 1em;
                padding: 10px 20px;
            }
            .cursor-glow {
                width: 40px;
                height: 40px;
            }
            .cursor-glow.clicked {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div> <div class="welcome-container">
        <h1 id="welcomeTitle">Bem-vindo à LifeStyle</h1>
        <a href="index.html" class="enter-button" id="enterButton">Explorar Produtos</a>
    </div>

    <div class="cursor-glow"></div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        const cursorGlow = document.querySelector('.cursor-glow');
        const welcomeContainer = document.querySelector('.welcome-container'); // Pode não ser necessário, mas mantido
        const welcomeTitle = document.getElementById('welcomeTitle');
        const enterButton = document.getElementById('enterButton');

        document.addEventListener('mousemove', (e) => {
            // Efeito de brilho
            cursorGlow.style.left = `${e.clientX}px`;
            cursorGlow.style.top = `${e.clientY}px`;

            // Efeito Parallax
            // Ajuste para a intensidade do parallax.
            // Dividir por um número maior para menos movimento, menor para mais.
            const sensitivity = 50; // Ajuste a sensibilidade do parallax
            const x = (window.innerWidth / 2 - e.clientX) / sensitivity;
            const y = (window.innerHeight / 2 - e.clientY) / sensitivity;

            // Movimento do título (mais profundo)
            // Multiplique por um fator maior para o título se mover mais
            welcomeTitle.style.transform = `translate3d(${x * 1.5}px, ${y * 1.5}px, 20px)`;
            // Movimento do botão (menos profundo e na direção oposta ao título)
            // Multiplique por um fator menor para o botão se mover menos
            enterButton.style.transform = `translate3d(${x * -0.8}px, ${y * -0.8}px, 10px)`;
        });

        document.addEventListener('mousedown', () => {
            cursorGlow.classList.add('clicked');
        });

        document.addEventListener('mouseup', () => {
            cursorGlow.classList.remove('clicked');
        });

        // Configuração do particles.js
        particlesJS('particles-js', {
            "particles": {
                "number": {
                    "value": 80,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#ffffff"
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    },
                    "polygon": {
                        "nb_sides": 5
                    }
                },
                "opacity": {
                    "value": 0.5,
                    "random": false,
                    "anim": {
                        "enable": false,
                        "speed": 1,
                        "opacity_min": 0.1,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": false,
                        "speed": 40,
                        "size_min": 0.1,
                        "sync": false
                    }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#ffffff",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 3,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": {
                        "enable": false,
                        "rotateX": 600,
                        "rotateY": 1200
                    }
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "grab" /* "repulse" ou "bubble" também são opções interessantes */
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                },
                "modes": {
                    "grab": {
                        "distance": 140,
                        "line_linked": {
                            "opacity": 1
                        }
                    },
                    "bubble": {
                        "distance": 400,
                        "size": 40,
                        "duration": 2,
                        "opacity": 8,
                        "speed": 3
                    },
                    "repulse": {
                        "distance": 200,
                        "duration": 0.4
                    },
                    "push": {
                        "particles_nb": 4
                    },
                    "remove": {
                        "particles_nb": 2
                    }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
