<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Produto | Triunfando com Cristo</title>

    <link rel="stylesheet"
        href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="header-left">

            <a href="index.html"
                class="btn-home">

                <h1>Triunfando com Cristo</h1>

            </a>

        </div>

        <!-- LOGIN -->

        <a href="identificacao.html"
            id="login-link"
            class="btn-login">

            <i class="fas fa-user"></i>

            <span>Entrar / Cadastrar</span>

        </a>

        <!-- USUÁRIO -->

        <div id="user-logged"
            style="display:none;">

            <span id="user-name"></span>

            <button onclick="logout()"
                class="btn-logout">

                <i class="fas fa-sign-out-alt"></i>

            </button>

        </div>

        <!-- CARRINHO -->

        <a href="carrinho.html"
            class="btn-ver-carrinho">

            <i class="fas fa-shopping-cart"></i>

            <span id="cart-item-count">

                0

            </span>

        </a>

    </header>

    <!-- PRODUTO -->

    <main class="produto-container">

        <div class="produto-imagem">

            <img id="produto-img"
                src=""
                alt="Produto">

            <div class="miniaturas"
                id="miniaturas-container">

            </div>

        </div>

        <div class="produto-info">

            <span class="produto-tag">

                Nova coleção

            </span>

            <h1 id="produto-nome">

                Produto

            </h1>

            <div class="preco"
                id="produto-preco">

                R$ 0,00

            </div>

            <p class="descricao"
                id="produto-descricao">

                Descrição do produto.

            </p>

            <!-- INFO BOX -->

            <div class="info-box">

                <div class="info-item">

                    <i class="fas fa-truck"></i>

                    Frete rápido para todo Brasil

                </div>

                <div class="info-item">

                    <i class="fas fa-shield-alt"></i>

                    Compra 100% segura

                </div>

                <div class="info-item">

                    <i class="fas fa-credit-card"></i>

                    Parcelamento em até 12x

                </div>

            </div>

            <!-- TAMANHO -->

            <h3>

                Tamanho

            </h3>

            <select id="tamanho">

                <option value="P">P</option>

                <option value="M">M</option>

                <option value="G">G</option>

                <option value="GG">GG</option>

            </select>

            <!-- COR -->

            <h3>

                Cor

            </h3>

            <select id="cor">

                <option value="Preto">

                    Preto

                </option>

                <option value="Branco">

                    Branco

                </option>

                <option value="Bege">

                    Bege

                </option>

                <option value="Azul">

                    Azul

                </option>

            </select>

            <!-- BOTÃO -->

            <button class="btn-carrinho"
                onclick="adicionarAoCarrinho()">

                <i class="fas fa-shopping-cart"></i>

                Adicionar ao carrinho

            </button>

        </div>

    </main>

    <script>

        // =========================
        // PRODUTOS
        // =========================

        const produtos = {

            1: {

                nome:
                    "Nike Branco",

                preco:
                    299.90,

                descricao:
                    "Tênis premium moderno com acabamento sofisticado e máximo conforto.",

                imagens: [

                    "./ROUPAS/nike branco.jpeg"

                ]

            },

            2: {

                nome:
                    "Camiseta Preta",

                preco:
                    119.90,

                descricao:
                    "Camiseta minimalista premium para composições elegantes.",

                imagens: [

                    "./ROUPAS/camiseta preta.jpeg"

                ]

            },

            3: {

                nome:
                    "Calça Preta",

                preco:
                    189.90,

                descricao:
                    "Calça moderna e sofisticada para qualquer ocasião.",

                imagens: [

                    "./ROUPAS/calca preta 1.jpeg",
                    "./ROUPAS/calca preta 2.jpg",
                    "./ROUPAS/calca preta 3.jpg"

                ]

            },

            4: {

                nome:
                    "Calça Bege",

                preco:
                    189.90,

                descricao:
                    "Estilo refinado e conforto absoluto.",

                imagens: [

                    "./ROUPAS/calca bege 1.jpeg",
                    "./ROUPAS/calca bege 2.jpg",
                    "./ROUPAS/calca bege 3.jpg"

                ]

            },

            5: {

                nome:
                    "Nike Azul",

                preco:
                    329.90,

                descricao:
                    "Tênis premium moderno com visual exclusivo.",

                imagens: [

                    "./ROUPAS/nike azul.jpeg"

                ]

            },

            6: {

                nome:
                    "Calça Jeans Escuro",

                preco:
                    219.90,

                descricao:
                    "Calça jeans escura premium moderna.",

                imagens: [

                    "./ROUPAS/calca jeans escuro 1.jpg",
                    "./ROUPAS/calca jeans escuro 2.jpg",
                    "./ROUPAS/calca jeans escuro 3.jpg"

                ]

            },

            7: {

                nome:
                    "Calça Jeans Claro",

                preco:
                    219.90,

                descricao:
                    "Calça jeans clara estilosa e confortável.",

                imagens: [

                    "./ROUPAS/calca jeans claro 1.jpg",
                    "./ROUPAS/calca jeans claro 2.jpg",
                    "./ROUPAS/calca jeans claro 3.jpg"

                ]

            },

            8: {

                nome:
                    "Boné Logo Vermelha",

                preco:
                    89.90,

                descricao:
                    "Boné premium moderno com logo vermelha e acabamento sofisticado.",

                imagens: [

                    "./ROUPAS/bone 1.jpeg"

                ]

            },

            9: {

                nome:
                    "Boné Logo K",

                preco:
                    89.90,

                descricao:
                    "Boné estiloso com logo K e visual minimalista.",

                imagens: [

                    "./ROUPAS/bone 2.jpeg"

                ]

            },

            10: {

                nome:
                    "Boné Caveira",

                preco:
                    89.90,

                descricao:
                    "Boné moderno com estampa de caveira e design premium.",

                imagens: [

                    "./ROUPAS/bone 3.jpeg"

                ]

            }

        };

        // =========================
        // PEGAR ID
        // =========================

        const params =
            new URLSearchParams(
                window.location.search
            );

        const id =
            params.get("id") || 1;

        const produto =
            produtos[id];

        // =========================
        // CARREGAR PRODUTO
        // =========================

        function carregarProduto() {

            document.getElementById(
                "produto-nome"
            ).innerText =
                produto.nome;

            document.getElementById(
                "produto-preco"
            ).innerText =
                `R$ ${produto.preco.toFixed(2).replace('.', ',')}`;

            document.getElementById(
                "produto-descricao"
            ).innerText =
                produto.descricao;

            const imagemPrincipal =
                document.getElementById(
                    "produto-img"
                );

            imagemPrincipal.src =
                produto.imagens[0];

            const miniaturasContainer =
                document.getElementById(
                    "miniaturas-container"
                );

            miniaturasContainer.innerHTML =
                "";

            produto.imagens.forEach(
                (img, index) => {

                    const mini =
                        document.createElement(
                            "img"
                        );

                    mini.src = img;

                    if(index === 0){

                        mini.classList.add(
                            "miniatura-ativa"
                        );

                    }

                    mini.onclick = () => {

                        imagemPrincipal.src =
                            img;

                        document
                        .querySelectorAll(
                            ".miniaturas img"
                        )
                        .forEach(el =>
                            el.classList.remove(
                                "miniatura-ativa"
                            )
                        );

                        mini.classList.add(
                            "miniatura-ativa"
                        );

                    };

                    miniaturasContainer
                        .appendChild(mini);

                }
            );

        }

        // LOGIN

        function checkLogin() {

            const usuario =
                localStorage.getItem(
                    "usuario_nome"
                );

            const loginLink =
                document.getElementById(
                    "login-link"
                );

            const userLogged =
                document.getElementById(
                    "user-logged"
                );

            const userName =
                document.getElementById(
                    "user-name"
                );

            if(usuario){

                loginLink.style.display =
                    "none";

                userLogged.style.display =
                    "flex";

                userName.innerText =
                    "Olá, " + usuario;

            }else{

                loginLink.style.display =
                    "flex";

                userLogged.style.display =
                    "none";

            }

        }

        // LOGOUT

        function logout(){

            localStorage.removeItem(
                "usuario_nome"
            );

            localStorage.removeItem(
                "usuario_email"
            );

            localStorage.removeItem(
                "usuario_id"
            );

            localStorage.removeItem(
                "usuario_logado"
            );

            window.location.href =
                "index.html";

        }

        // CARRINHO

        function updateCartItemCount(){

            const carrinho =
                JSON.parse(
                    localStorage.getItem(
                        "carrinho"
                    )
                ) || [];

            const totalItems =
                carrinho.reduce(
                    (sum, item) =>
                        sum + item.quantidade,
                    0
                );

            document.getElementById(
                "cart-item-count"
            ).innerText =
                totalItems;

        }

        // ADICIONAR

        function adicionarAoCarrinho(){

            const tamanho =
                document.getElementById(
                    "tamanho"
                ).value;

            const cor =
                document.getElementById(
                    "cor"
                ).value;

            let carrinho =
                JSON.parse(
                    localStorage.getItem(
                        "carrinho"
                    )
                ) || [];

            const itemExistente =
                carrinho.find(
                    item =>
                        item.id == id &&
                        item.tamanho == tamanho &&
                        item.cor == cor
                );

            if(itemExistente){

                itemExistente.quantidade += 1;

            }else{

                carrinho.push({

                    id:id,

                    nome:produto.nome,

                    preco:produto.preco,

                    imagem:produto.imagens[0],

                    tamanho:tamanho,

                    cor:cor,

                    quantidade:1

                });

            }

            localStorage.setItem(
                "carrinho",
                JSON.stringify(carrinho)
            );

            updateCartItemCount();

            alert(
                "Produto adicionado ao carrinho!"
            );

        }

        // INIT

        window.onload = () => {

            carregarProduto();

            checkLogin();

            updateCartItemCount();

        };

    </script>

</body>

</html>
