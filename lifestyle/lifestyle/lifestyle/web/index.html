<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Triunfando com Cristo</title>

    <link rel="stylesheet"
        href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="header-left">

            <a href="index.html"
                class="btn-home">

                <h1>Triunfando com Cristo</h1>

            </a>

        </div>

        <!-- LOGIN -->

        <a href="identificacao.html"
            id="login-link"
            class="btn-login">

            <i class="fas fa-user"></i>

            <span>Entrar / Cadastrar</span>

        </a>

        <!-- USUÁRIO -->

        <div id="user-logged"
            style="display:none;">

            <span id="user-name"></span>

            <button onclick="logout()"
                class="btn-logout">

                <i class="fas fa-sign-out-alt"></i>

            </button>

        </div>

        <!-- CARRINHO -->

        <a href="carrinho.html"
            class="btn-ver-carrinho">

            <i class="fas fa-shopping-cart"></i>

            <span id="cart-item-count">0</span>

        </a>

    </header>

    <!-- CARROSSEL -->

    <section class="modern-carousel">

        <div class="carousel-wrapper">

            <button class="nav-btn left"
                onclick="prevSlide()">

                <i class="fas fa-arrow-left"></i>

            </button>

            <div class="carousel">

                <!-- PRODUTO 1 -->

                <div class="slide active">

                    <a href="produto.html?id=1">

                        <img src="./ROUPAS/nike branco.jpeg"
                            alt="Tênis Nike Branco">

                    </a>

                </div>

                <!-- PRODUTO 2 -->

                <div class="slide">

                    <a href="produto.html?id=2">

                        <img src="./ROUPAS/camiseta preta.jpeg"
                            alt="Camiseta Preta">

                    </a>

                </div>

                <!-- PRODUTO 3 -->

                <div class="slide">

                    <a href="produto.html?id=3">

                        <img src="./ROUPAS/calca preta 1.jpeg"
                            alt="Calça Preta">

                    </a>

                </div>

                <!-- PRODUTO 4 -->

                <div class="slide">

                    <a href="produto.html?id=4">

                        <img src="./ROUPAS/calca bege 1.jpeg"
                            alt="Calça Bege">

                    </a>

                </div>

                <!-- PRODUTO 5 -->

                <div class="slide">

                    <a href="produto.html?id=5">

                        <img src="./ROUPAS/nike azul.jpeg"
                            alt="Nike Azul">

                    </a>

                </div>

                <!-- PRODUTO 6 -->

                <div class="slide">

                    <a href="produto.html?id=6">

                        <img src="./ROUPAS/calca jeans escuro 1.jpg"
                            alt="Calça Jeans Escura">

                    </a>

                </div>

                <!-- PRODUTO 7 -->

                <div class="slide">

                    <a href="produto.html?id=7">

                        <img src="./ROUPAS/calca jeans claro 1.jpg"
                            alt="Calça Jeans Clara">

                    </a>

                </div>

                <!-- PRODUTO 8 -->

                <div class="slide">

                    <a href="produto.html?id=8">

                        <img src="./ROUPAS/bone 1.jpeg"
                            alt="Boné 1">

                    </a>

                </div>

                <!-- PRODUTO 9 -->

                <div class="slide">

                    <a href="produto.html?id=9">

                        <img src="./ROUPAS/bone 2.jpeg"
                            alt="Boné 2">

                    </a>

                </div>

                <!-- PRODUTO 10 -->

                <div class="slide">

                    <a href="produto.html?id=10">

                        <img src="./ROUPAS/bone 3.jpeg"
                            alt="Boné 3">

                    </a>

                </div>

            </div>

            <button class="nav-btn right"
                onclick="nextSlide()">

                <i class="fas fa-arrow-right"></i>

            </button>

        </div>

        <!-- DOTS -->

        <div class="dots"></div>

    </section>

    <script>

        // =========================
        // LOGIN
        // =========================

        function checkLogin() {

            const usuario =
                localStorage.getItem(
                    "usuario_nome"
                );

            const userLoggedDiv =
                document.getElementById(
                    "user-logged"
                );

            const loginLink =
                document.getElementById(
                    "login-link"
                );

            const userNameSpan =
                document.getElementById(
                    "user-name"
                );

            if (usuario) {

                loginLink.style.display =
                    "none";

                userLoggedDiv.style.display =
                    "flex";

                userNameSpan.textContent =
                    "Olá, " + usuario;

            } else {

                loginLink.style.display =
                    "flex";

                userLoggedDiv.style.display =
                    "none";

            }

        }

        // =========================
        // LOGOUT
        // =========================

        function logout() {

            localStorage.removeItem(
                "usuario_nome"
            );

            localStorage.removeItem(
                "usuario_email"
            );

            localStorage.removeItem(
                "usuario_id"
            );

            localStorage.removeItem(
                "usuario_logado"
            );

            window.location.href =
                "index.html";

        }

        // =========================
        // CARRINHO
        // =========================

        function updateCartItemCount() {

            const carrinho =
                JSON.parse(
                    localStorage.getItem(
                        "carrinho"
                    )
                ) || [];

            const totalItems =
                carrinho.reduce(
                    (sum, item) =>
                        sum + item.quantidade,
                    0
                );

            const cartCount =
                document.getElementById(
                    'cart-item-count'
                );

            if (cartCount) {

                cartCount.textContent =
                    totalItems;

            }

        }

        // =========================
        // CARROSSEL
        // =========================

        const slides =
            document.querySelectorAll(
                ".slide"
            );

        const dotsContainer =
            document.querySelector(
                ".dots"
            );

        let current = 0;

        // Criar dots

        slides.forEach((_, index) => {

            const dot =
                document.createElement(
                    "span"
                );

            dot.classList.add(
                "dot"
            );

            if (index === 0) {

                dot.classList.add(
                    "active-dot"
                );

            }

            dot.addEventListener(
                "click",
                () => {

                    current = index;

                    updateCarousel();

                }
            );

            dotsContainer.appendChild(dot);

        });

        const dots =
            document.querySelectorAll(
                ".dot"
            );

        function updateCarousel() {

            slides.forEach(slide => {

                slide.className =
                    "slide";

            });

            dots.forEach(dot => {

                dot.classList.remove(
                    "active-dot"
                );

            });

            slides[current]
                .classList.add(
                    "active"
                );

            const prev =
                (current - 1 + slides.length)
                % slides.length;

            const next =
                (current + 1)
                % slides.length;

            slides[prev]
                .classList.add(
                    "left"
                );

            slides[next]
                .classList.add(
                    "right"
                );

            const hiddenLeft =
                (current - 2 + slides.length)
                % slides.length;

            const hiddenRight =
                (current + 2)
                % slides.length;

            slides[hiddenLeft]
                .classList.add(
                    "hidden-left"
                );

            slides[hiddenRight]
                .classList.add(
                    "hidden-right"
                );

            dots[current]
                .classList.add(
                    "active-dot"
                );

        }

        function nextSlide() {

            current =
                (current + 1)
                % slides.length;

            updateCarousel();

        }

        function prevSlide() {

            current =
                (current - 1 + slides.length)
                % slides.length;

            updateCarousel();

        }

        // AUTO SLIDE

        setInterval(
            nextSlide,
            3000
        );

        // =========================
        // INIT
        // =========================

        window.onload = () => {

            checkLogin();

            updateCartItemCount();

            updateCarousel();

        };

    </script>

</body>

</html>
