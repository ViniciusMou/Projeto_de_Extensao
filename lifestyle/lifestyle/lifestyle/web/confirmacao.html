<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Compra Finalizada | Triunfando com Cristo</title>

    <link rel="stylesheet"
        href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body onload="checkLogin()">

    <!-- HEADER -->

    <header>

        <div class="header-left">

            <a href="index.html"
                class="btn-home">

                <h1>Triunfando com Cristo</h1>

            </a>

        </div>

        <div class="header-right">

            <a href="identificacao.html"
                id="login-link"
                class="btn-login">

                <i class="fas fa-user"></i>

                <span>Entrar / Cadastrar</span>

            </a>

            <div id="user-logged"
                style="display:none;">

                <span id="user-name"></span>

                <button onclick="logout()"
                    class="btn-logout">

                    <i class="fas fa-sign-out-alt"></i>

                </button>

            </div>

        </div>

    </header>

    <!-- MAIN -->

    <main class="cart-page-main">

        <!-- PROGRESS -->

        <div class="progress-bar-container">

            <div class="progress-step complete">

                <span class="step-number">

                    <i class="fas fa-check"></i>

                </span>

                <span class="step-text">

                    Carrinho

                </span>

            </div>

            <div class="progress-line complete"></div>

            <div class="progress-step complete">

                <span class="step-number">

                    <i class="fas fa-check"></i>

                </span>

                <span class="step-text">

                    Identificação

                </span>

            </div>

            <div class="progress-line complete"></div>

            <div class="progress-step complete">

                <span class="step-number">

                    <i class="fas fa-check"></i>

                </span>

                <span class="step-text">

                    Pagamento

                </span>

            </div>

            <div class="progress-line complete"></div>

            <div class="progress-step active">

                <span class="step-number">

                    <i class="fas fa-check"></i>

                </span>

                <span class="step-text">

                    Finalizado

                </span>

            </div>

        </div>

        <!-- CONFIRMAÇÃO -->

        <section class="confirmation-container">

            <div class="confirmation-box">

                <div class="confirmation-icon">

                    <i class="fas fa-check-circle"></i>

                </div>

                <h1>

                    Compra Finalizada!

                </h1>

                <p>

                    Seu pedido foi realizado com sucesso.
                    Obrigado por comprar conosco 💛

                </p>

                <div class="confirmation-info">

                    <div class="info-line">

                        <span>

                            Número do Pedido

                        </span>

                        <strong id="pedido-id">

                            #000001

                        </strong>

                    </div>

                    <div class="info-line">

                        <span>

                            Forma de Pagamento

                        </span>

                        <strong>

                            PIX

                        </strong>

                    </div>

                    <div class="info-line">

                        <span>

                            Status

                        </span>

                        <strong class="status-success">

                            Pagamento Aguardando Confirmação

                        </strong>

                    </div>

                </div>

                <a href="index.html"
                    class="primary-btn back-home-btn">

                    Voltar para Loja

                </a>

            </div>

        </section>

    </main>

    <script>

        // =========================
        // LOGIN
        // =========================

        function checkLogin() {

            const usuario =
                localStorage.getItem(
                    "usuario_nome"
                );

            const loginLink =
                document.getElementById(
                    "login-link"
                );

            const userLogged =
                document.getElementById(
                    "user-logged"
                );

            const userName =
                document.getElementById(
                    "user-name"
                );

            if (usuario) {

                loginLink.style.display =
                    "none";

                userLogged.style.display =
                    "flex";

                userName.innerText =
                    "Olá, " + usuario;

            } else {

                loginLink.style.display =
                    "flex";

                userLogged.style.display =
                    "none";

            }

            gerarPedido();

        }

        // =========================
        // GERAR PEDIDO
        // =========================

        function gerarPedido() {

            const numeroPedido =
                Math.floor(
                    100000 + Math.random() * 900000
                );

            document.getElementById(
                "pedido-id"
            ).innerText =
                "#" + numeroPedido;

        }

        // =========================
        // LOGOUT
        // =========================

        function logout() {

            localStorage.removeItem(
                "usuario_nome"
            );

            localStorage.removeItem(
                "usuario_email"
            );

            localStorage.removeItem(
                "usuario_id"
            );

            localStorage.removeItem(
                "usuario_logado"
            );

            window.location.href =
                "index.html";

        }

    </script>

</body>

</html>
