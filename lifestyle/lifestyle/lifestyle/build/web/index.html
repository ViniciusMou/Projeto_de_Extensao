<script>

    // --- FUNÇÕES DE INTERFACE ---
    function exibirProdutos(listaProdutos) {

        const containerProdutos =
            document.getElementById("produtos");

        if (!containerProdutos) return;

        containerProdutos.innerHTML = "";

        if (listaProdutos.length === 0) {

            containerProdutos.innerHTML =
                "<p class='no-products-message'>Nenhum produto encontrado.</p>";

            const countMessage =
                document.getElementById('product-count-message');

            if (countMessage) {
                countMessage.innerText =
                    "0 produtos encontrados.";
            }

            return;
        }

        listaProdutos.forEach(produto => {

            const produtoDiv =
                document.createElement("div");

            produtoDiv.classList.add("product-card");

            produtoDiv.innerHTML = `

                <a href="produto.html?id=${produto.id}"
                   class="product-link">

                    <img src="${produto.imagem}"
                         alt="${produto.nome}">

                </a>

                <h3>${produto.nome}</h3>

                <p class="product-price">
                    R$ ${produto.preco
                        .toFixed(2)
                        .replace('.', ',')}
                </p>

                <div class="product-options">

                    <select class="product-size">

                        ${produto.tamanhos.map(t =>
                            `<option value="${t}">
                                ${t}
                            </option>`
                        ).join('')}

                    </select>

                    <select class="product-color">

                        ${produto.cores.map(c =>
                            `<option value="${c}">
                                ${c}
                            </option>`
                        ).join('')}

                    </select>

                </div>

                <button class="add-to-cart-btn"
                    data-product-id="${produto.id}">

                    Adicionar ao Carrinho

                </button>
            `;

            containerProdutos.appendChild(produtoDiv);
        });

        const countMessage =
            document.getElementById('product-count-message');

        if (countMessage) {

            countMessage.innerText =
                `${listaProdutos.length} produtos encontrados.`;
        }

        document.querySelectorAll(".add-to-cart-btn")
            .forEach(button => {

            button.addEventListener(
                "click",
                adicionarAoCarrinho
            );
        });
    }

    // --- CARRINHO ---
    function adicionarAoCarrinho(event) {

        const button = event.target;

        const productId =
            parseInt(button.dataset.productId);

        const produtoSelecionado =
            produtos.find(p => p.id === productId);

        const productCard =
            button.closest('.product-card');

        const tamanhoSelecionado =
            productCard.querySelector('.product-size').value;

        const corSelecionada =
            productCard.querySelector('.product-color').value;

        if (produtoSelecionado) {

            let carrinho =
                JSON.parse(
                    localStorage.getItem("carrinho")
                ) || [];

            const itemExistente =
                carrinho.find(item =>

                item.id === productId &&
                item.tamanho === tamanhoSelecionado &&
                item.cor === corSelecionada
            );

            if (itemExistente) {

                itemExistente.quantidade++;

            } else {

                carrinho.push({

                    ...produtoSelecionado,

                    tamanho: tamanhoSelecionado,

                    cor: corSelecionada,

                    quantidade: 1
                });
            }

            localStorage.setItem(
                "carrinho",
                JSON.stringify(carrinho)
            );

            updateCartItemCount();

            button.textContent = "Adicionado!";

            button.classList.add("added-feedback");

            setTimeout(() => {

                button.textContent =
                    "Adicionar ao Carrinho";

                button.classList.remove(
                    "added-feedback"
                );

            }, 1500);
        }
    }

    function updateCartItemCount() {

        const carrinho =
            JSON.parse(
                localStorage.getItem("carrinho")
            ) || [];

        const totalItems =
            carrinho.reduce(
                (sum, item) =>
                sum + item.quantidade,
                0
            );

        const cartCount =
            document.getElementById(
                'cart-item-count'
            );

        if (cartCount) {

            cartCount.textContent =
                totalItems;
        }
    }

    // --- FILTROS ---
    function filtrarProdutos() {

        if (typeof produtos === "undefined")
            return;

        const buscaInput =
            document.getElementById("busca");

        const categoriaInput =
            document.getElementById("categoria");

        const termoBusca =
            buscaInput
            ? buscaInput.value.toLowerCase()
            : "";

        const categoriaSelecionada =
            categoriaInput
            ? categoriaInput.value
            : "";

        const produtosFiltrados =
            produtos.filter(produto => {

            const correspondeBusca =
                produto.nome
                    .toLowerCase()
                    .includes(termoBusca);

            const correspondeCategoria =

                categoriaSelecionada === "" ||

                produto.categoria ===
                categoriaSelecionada;

            return correspondeBusca &&
                   correspondeCategoria;
        });

        exibirProdutos(produtosFiltrados);
    }

    // --- LOGIN ---
    function checkLogin() {

        const usuario =
            localStorage.getItem("usuario_nome");

        const userLoggedDiv =
            document.getElementById("user-logged");

        const loginLink =
            document.getElementById("login-link");

        const userNameSpan =
            document.getElementById("user-name");

        if (usuario) {

            loginLink.style.display = "none";

            userLoggedDiv.style.display = "block";

            userNameSpan.textContent =
                "Olá, " + usuario;

        } else {

            loginLink.style.display = "block";

            userLoggedDiv.style.display = "none";
        }
    }

function logout() {

    // Remove dados do usuário
    localStorage.removeItem("usuario_nome");
    localStorage.removeItem("usuario_email");
    localStorage.removeItem("usuario_id");
    localStorage.removeItem("usuario_logado");

    // Opcional:
    // sessionStorage.clear();

    // Redireciona para página inicial
    window.location.href = "index.html";
}

    // --- INICIALIZAÇÃO ---
    window.onload = () => {

        if (typeof produtos !== "undefined") {

            exibirProdutos(produtos);
        }

        updateCartItemCount();

        checkLogin();

        // ===== FILTROS =====

        const busca =
            document.getElementById("busca");

        const categoria =
            document.getElementById("categoria");

        const clearBtn =
            document.getElementById(
                "clear-filters-btn"
            );

        if (busca) {

            busca.addEventListener(
                "input",
                filtrarProdutos
            );
        }

        if (categoria) {

            categoria.addEventListener(
                "change",
                filtrarProdutos
            );
        }

        if (clearBtn) {

            clearBtn.addEventListener(
                "click",
                () => {

                if (busca) {
                    busca.value = "";
                }

                if (categoria) {
                    categoria.value = "";
                }

                if (
                    typeof produtos !== "undefined"
                ) {
                    exibirProdutos(produtos);
                }
            });
        }

        // ===== LOGIN FORM =====

        const loginForm =
            document.getElementById(
                'login-form'
            );

        if (loginForm) {

            loginForm.addEventListener(
                'submit',
                function(event) {

                // sua lógica aqui

            });
        }

        updateCarousel();
    };

    // ===== CARROSSEL =====

    const slides =
        document.querySelectorAll(".slide");

    const dots =
        document.querySelectorAll(".dot");

    let current = 0;

    function updateCarousel() {

        slides.forEach(slide => {

            slide.className = "slide";
        });

        dots.forEach(dot => {

            dot.classList.remove(
                "active-dot"
            );
        });

        slides[current]
            .classList.add("active");

        const prev =
            (current - 1 + slides.length)
            % slides.length;

        const next =
            (current + 1)
            % slides.length;

        slides[prev]
            .classList.add("left");

        slides[next]
            .classList.add("right");

        const hiddenLeft =
            (current - 2 + slides.length)
            % slides.length;

        const hiddenRight =
            (current + 2)
            % slides.length;

        slides[hiddenLeft]
            .classList.add("hidden-left");

        slides[hiddenRight]
            .classList.add("hidden-right");

        dots[current]
            .classList.add("active-dot");
    }

    function nextSlide() {

        current =
            (current + 1)
            % slides.length;

        updateCarousel();
    }

    function prevSlide() {

        current =
            (current - 1 + slides.length)
            % slides.length;

        updateCarousel();
    }

    setInterval(nextSlide, 3000);

</script>
</body>
