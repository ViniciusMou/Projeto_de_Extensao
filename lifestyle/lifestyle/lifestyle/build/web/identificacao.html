<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação - LifeStyle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body onload="checkLogin()">
    <header>
    <div class="header-left">
        <!-- Botão de Início com ícone -->
        <a href="index.html" class="btn-home" title="Voltar ao Início">
            <h1>LifeStyle</h1>
        </a>
    </div>
    
            <!-- Link visível quando deslogado -->
            <a href="identificacao.html" id="login-link" class="btn-login">
                <i class="fas fa-user"></i> <span>Entrar / Cadastrar</span>
            </a>
            <!-- Div visível quando logado -->
            <div id="user-logged" style="display: none;">
                <span id="user-name"></span>
                <button onclick="logout()" class="btn-logout" title="Sair">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
                <a href="carrinho.html" class="btn-voltar-carrinho">
                    <i class="fas fa-arrow-left">
                    </i>
                   <span>Voltar ao carrinho</span></a>
    </header>

    <main class="cart-page-main">
        <div class="progress-bar-container">
            <div class="progress-step complete"> <span class="step-number"><i class="fas fa-check"></i></span>
                <span class="step-text">Carrinho</span>
            </div>
            <div class="progress-line complete"></div>
            <div class="progress-step active"> <span class="step-number">2</span>
                <span class="step-text">Identificação</span>
            </div>
            <div class="progress-line"></div>
            <div class="progress-step">
                <span class="step-number">3</span>
                <span class="step-text">Pagamento</span>
            </div>
            <div class="progress-line"></div>
            <div class="progress-step">
                <span class="step-number">4</span>
                <span class="step-text">Finalizar</span>
            </div>
        </div>
        
        <div class="auth-forms-container">
            <div class="login-section section-box">
                <h2 class="section-title">Já sou cliente</h2>
                <form id="login-form" action="login.jsp" method="post">
                    <div class="input-group">
                        <label for="login-email">E-mail:</label>
                        <input type="email" id="login-email" name="email" required autocomplete="email" placeholder="seuemail@exemplo.com">
                        <span class="error-message" id="login-email-error"></span>
                    </div>
                    <div class="input-group password-input-group">
                        <label for="login-password">Senha:</label>
                        <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="********">
                        <i class="fas fa-eye toggle-password" data-target="login-password"></i>
                        <span class="error-message" id="login-password-error"></span>
                    </div>
                    <a href="#" class="link-secondary forgot-password">Esqueci minha senha</a>
                    <button type="submit" class="primary-btn">Entrar e Continuar</button>
                </form>
            </div>

            <div class="register-section section-box">
                <h2 class="section-title">Cadastre-se</h2>
                <form id="register-form" action="cadastro.jsp" method="post">
                    <div class="input-group">
                        <label for="register-name">Nome Completo:</label>
                        <input type="text" id="register-name" name="name" required autocomplete="name" placeholder="Seu Nome Completo">
                        <span class="error-message" id="register-name-error"></span>
                    </div>
                    <div class="input-group">
                        <label for="register-email">E-mail:</label>
                        <input type="email" id="register-email" name="email" required autocomplete="email" placeholder="seuemail@exemplo.com">
                        <span class="error-message" id="register-email-error"></span>
                    </div>
                    <div class="input-group">
                        <label for="register-cpf">CPF:</label>
                        <input type="text" id="register-cpf" name="cpf" required maxlength="14" placeholder="000.000.000-00">
                        <span class="error-message" id="register-cpf-error"></span>
                    </div>
                    <div class="input-group">
                        <label for="register-phone">Telefone:</label>
                        <input type="tel" id="register-phone" name="phone" required maxlength="15" placeholder="(XX) XXXXX-XXXX">
                        <span class="error-message" id="register-phone-error"></span>
                    </div>
                    <div class="input-group password-input-group">
                        <label for="register-password">Senha:</label>
                        <input type="password" id="register-password" name="password" required placeholder="Mínimo 6 caracteres">
                        <i class="fas fa-eye toggle-password" data-target="register-password"></i>
                        <span class="error-message" id="register-password-error"></span>
                    </div>
                    <div class="input-group password-input-group">
                        <label for="register-confirm-password">Confirmar Senha:</label>
                        <input type="password" id="register-confirm-password" name="confirm_password" required placeholder="Confirme sua senha">
                        <i class="fas fa-eye toggle-password" data-target="register-confirm-password"></i>
                        <span class="error-message" id="register-confirm-password-error"></span>
                    </div>

                    <label class="checkbox-container">
                        Li e aceito a <a href="#" class="link-secondary">Política de Privacidade</a>.
                        <input type="checkbox" id="privacy-checkbox" required>
                        <span class="checkmark"></span>
                        <span class="error-message" id="privacy-checkbox-error"></span>
                    </label>

                    <button type="submit" class="primary-btn">Cadastrar e Continuar</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            // Função para exibir mensagem de erro
            function displayError(inputElement, message) {
                const errorSpan = document.getElementById(`${inputElement.id}-error`);
                if (errorSpan) {
                    errorSpan.textContent = message;
                    inputElement.classList.add('input-error');
                }
            }

            // Função para limpar mensagem de erro
            function clearError(inputElement) {
                const errorSpan = document.getElementById(`${inputElement.id}-error`);
                if (errorSpan) {
                    errorSpan.textContent = '';
                    inputElement.classList.remove('input-error');
                }
            }

            // Validação de E-mail
            function validateEmail(input) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(input.value)) {
                    displayError(input, 'Por favor, insira um e-mail válido.');
                    return false;
                }
                clearError(input);
                return true;
            }

            // Validação de Senha
            function validatePassword(input) {
                if (input.value.length < 6) {
                    displayError(input, 'A senha deve ter no mínimo 6 caracteres.');
                    return false;
                }
                clearError(input);
                return true;
            }

            // Validação de Confirmação de Senha
            function validateConfirmPassword() {
                const passwordInput = document.getElementById('register-password');
                const confirmPasswordInput = document.getElementById('register-confirm-password');
                if (passwordInput.value !== confirmPasswordInput.value) {
                    displayError(confirmPasswordInput, 'As senhas não coincidem.');
                    return false;
                }
                clearError(confirmPasswordInput);
                return true;
            }

            // Validação de campo obrigatório
            function validateRequired(input) {
                if (input.value.trim() === '') {
                    displayError(input, 'Este campo é obrigatório.');
                    return false;
                }
                clearError(input);
                return true;
            }

            // Validação do checkbox de privacidade
            function validatePrivacyCheckbox() {
                const checkbox = document.getElementById('privacy-checkbox');
                if (!checkbox.checked) {
                    displayError(checkbox, 'Você deve aceitar a Política de Privacidade.');
                    return false;
                }
                clearError(checkbox);
                return true;
            }

            // Máscara para CPF
            const cpfInput = document.getElementById('register-cpf');
            if (cpfInput) {
                cpfInput.addEventListener('input', (e) => {
                    let value = e.target.value.replace(/\D/g, ''); // Remove tudo que não é dígito
                    if (value.length > 9) {
                        value = value.replace(/(\d{3})(\d)/, '$1.$2');
                        value = value.replace(/(\d{3})(\d)/, '$1.$2');
                        value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                    } else if (value.length > 6) {
                        value = value.replace(/(\d{3})(\d)/, '$1.$2');
                        value = value.replace(/(\d{3})(\d{1,})$/, '$1.$2');
                    } else if (value.length > 3) {
                        value = value.replace(/(\d{3})(\d)/, '$1.$2');
                    }
                    e.target.value = value;
                    validateRequired(e.target);
                });
            }

            // Máscara para Telefone
            const phoneInput = document.getElementById('register-phone');
            if (phoneInput) {
                phoneInput.addEventListener('input', (e) => {
                    let value = e.target.value.replace(/\D/g, ''); // Remove tudo que não é dígito
                    if (value.length > 10) {
                        value = value.replace(/^(\d\d)(\d{5})(\d{4}).*/, '($1) $2-$3');
                    } else if (value.length > 5) {
                        value = value.replace(/^(\d\d)(\d{4})(\d{0,4}).*/, '($1) $2-$3');
                    } else if (value.length > 2) {
                        value = value.replace(/^(\d\d)(\d{0,5}).*/, '($1) $2');
                    }
                    e.target.value = value;
                    validateRequired(e.target);
                });
            }

            // Toggle de visibilidade da senha
            document.querySelectorAll('.toggle-password').forEach(icon => {
                icon.addEventListener('click', (e) => {
                    const targetId = e.target.dataset.target;
                    const passwordField = document.getElementById(targetId);
                    if (passwordField.type === 'password') {
                        passwordField.type = 'text';
                        e.target.classList.remove('fa-eye');
                        e.target.classList.add('fa-eye-slash');
                    } else {
                        passwordField.type = 'password';
                        e.target.classList.remove('fa-eye-slash');
                        e.target.classList.add('fa-eye');
                    }
                });
            });


            // Event Listeners para validação em tempo real (login)
// Event Listeners para validação em tempo real (login)
if (loginForm) {
    document.getElementById('login-email').addEventListener('input', (e) => validateEmail(e.target));
    document.getElementById('login-password').addEventListener('input', (e) => validatePassword(e.target));

    loginForm.addEventListener('submit', function(event) {
        // Remova ou comente o event.preventDefault() para permitir o envio ao JSP
        // event.preventDefault(); 

        let isValid = true;
        isValid = validateEmail(document.getElementById('login-email')) && isValid;
        isValid = validatePassword(document.getElementById('login-password')) && isValid;

        if (isValid) {
            // Se os dados forem válidos no formato, o formulário é enviado para login.jsp
            console.log('Dados válidos, enviando para o servidor...');
            // O formulário seguirá para o "action" definido no HTML (login.jsp)
        } else {
            event.preventDefault(); // Só bloqueia se houver erro de digitação
            alert('Por favor, preencha os campos corretamente.');
        }
    });
}


            // Event Listeners para validação em tempo real (cadastro)
            if (registerForm) {
                document.getElementById('register-name').addEventListener('input', (e) => validateRequired(e.target));
                document.getElementById('register-email').addEventListener('input', (e) => validateEmail(e.target));
                // CPF e Telefone já têm validação de obrigatório no input event
                document.getElementById('register-password').addEventListener('input', (e) => {
                    validatePassword(e.target);
                    validateConfirmPassword(); // Verifica a confirmação de senha também
                });
                document.getElementById('register-confirm-password').addEventListener('input', validateConfirmPassword);
                document.getElementById('privacy-checkbox').addEventListener('change', validatePrivacyCheckbox);


                registerForm.addEventListener('submit', function(event) {
                    event.preventDefault();
                    let isValid = true;

                    // Valida todos os campos ao enviar
                    isValid = validateRequired(document.getElementById('register-name')) && isValid;
                    isValid = validateEmail(document.getElementById('register-email')) && isValid;
                    isValid = validateRequired(document.getElementById('register-cpf')) && isValid;
                    isValid = validateRequired(document.getElementById('register-phone')) && isValid;
                    isValid = validatePassword(document.getElementById('register-password')) && isValid;
                    isValid = validateConfirmPassword() && isValid;
                    isValid = validatePrivacyCheckbox() && isValid;

                   if (isValid) {
    // Se estiver tudo ok, o JS libera o envio para o "cadastro.jsp" definido no HTML
    console.log('Cadastro validado! Enviando dados...');
    registerForm.submit(); // <--- Esta linha envia o formulário de fato
} else {
    alert('Por favor, preencha todos os campos obrigatórios corretamente.');
}
                });
            }
        });
        
        function checkLogin() {
    const emailSalvo = localStorage.getItem("usuario_email");
    const loginLink = document.getElementById("login-link");
    const userLoggedDiv = document.getElementById("user-logged");
    const userNameSpan = document.getElementById("user-name");

    if (emailSalvo) {
        if (loginLink) loginLink.style.display = "none";
        if (userLoggedDiv) userLoggedDiv.style.display = "block";
        if (userNameSpan) userNameSpan.textContent = emailSalvo;
    } else {
        if (loginLink) loginLink.style.display = "block";
        if (userLoggedDiv) userLoggedDiv.style.display = "none";
    }
}

function logout() {

    // Remove dados do usuário
    localStorage.removeItem("usuario_nome");
    localStorage.removeItem("usuario_email");
    localStorage.removeItem("usuario_id");
    localStorage.removeItem("usuario_logado");

    // Opcional:
    // sessionStorage.clear();

    // Redireciona para página inicial
    window.location.href = "index.html";
}
    </script>
</body>
</html>
